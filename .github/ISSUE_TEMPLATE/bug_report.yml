name: Bug report
description: Report something that is not working.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: List the exact steps.
      placeholder: |
        1. Open QRNative
        2. ...
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: macOS 15.5
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Screenshots, logs, or extra context.

